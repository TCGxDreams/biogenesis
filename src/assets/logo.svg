<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <defs>
    <linearGradient id="flame" x1="50" y1="110" x2="50" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a2463"/>
      <stop offset="50%" stop-color="#1e5fa8"/>
      <stop offset="100%" stop-color="#00d4e8"/>
    </linearGradient>
    <linearGradient id="helix" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer flame shape -->
  <path d="M50 8
    C50 8, 72 22, 74 42
    C76 52, 68 58, 68 58
    C76 44, 70 30, 62 22
    C68 38, 66 52, 60 60
    C72 48, 72 32, 64 18
    C70 36, 68 56, 58 68
    C70 56, 74 38, 68 22
    C72 40, 70 60, 60 74
    C70 62, 74 44, 70 30
    C72 50, 68 68, 56 80
    C64 70, 70 52, 66 38
    C66 58, 60 76, 50 90
    C40 76, 34 58, 34 38
    C30 52, 36 70, 44 80
    C30 68, 28 50, 30 30
    C26 44, 28 62, 34 74
    C24 60, 26 40, 32 22
    C26 38, 28 56, 40 68
    C32 56, 30 36, 36 18
    C28 32, 28 48, 36 60
    C30 52, 32 38, 38 22
    C30 30, 26 52, 32 42
    C26 22, 50 8, 50 8Z"
    fill="url(#flame)" opacity="0.15"/>

  <!-- Primary flame left -->
  <path d="M50 10 C38 22, 28 38, 32 58 C28 48, 30 32, 38 22 C32 36, 30 52, 36 66 C30 54, 28 38, 34 24 C26 42, 28 62, 38 76 C28 62, 26 42, 32 26 C24 48, 28 70, 42 88 C34 72, 32 50, 38 32 C32 54, 34 76, 50 92Z"
    fill="url(#flame)" opacity="0.8"/>

  <!-- Primary flame right -->
  <path d="M50 10 C62 22, 72 38, 68 58 C72 48, 70 32, 62 22 C68 36, 70 52, 64 66 C70 54, 72 38, 66 24 C74 42, 72 62, 62 76 C72 62, 74 42, 68 26 C76 48, 72 70, 58 88 C66 72, 68 50, 62 32 C68 54, 66 76, 50 92Z"
    fill="url(#flame)" opacity="0.8"/>

  <!-- Center flame -->
  <path d="M50 5 C44 20, 40 38, 42 56 C40 44, 42 28, 48 16 C44 30, 42 48, 44 64 C42 50, 44 32, 50 18 C46 36, 44 58, 46 74 C44 58, 46 38, 52 22 C50 40, 48 62, 50 80 C52 62, 54 40, 52 22 C58 38, 56 58, 54 74 C56 58, 58 36, 56 18 C62 32, 60 50, 58 64 C60 48, 62 30, 58 16 C64 28, 62 44, 60 56 C62 38, 58 20, 50 5Z"
    fill="url(#flame)"/>

  <!-- DNA Helix - strand 1 (sinusoidal left-to-right going down) -->
  <path d="M38 28 C42 32, 58 36, 62 40 C58 44, 42 48, 38 52 C42 56, 58 60, 62 64 C58 68, 42 72, 38 76"
    stroke="url(#helix)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.9"/>

  <!-- DNA Helix - strand 2 -->
  <path d="M62 28 C58 32, 42 36, 38 40 C42 44, 58 48, 62 52 C58 56, 42 60, 38 64 C42 68, 58 72, 62 76"
    stroke="url(#helix)" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)" opacity="0.9"/>

  <!-- Rungs (base pairs) -->
  <line x1="43" y1="31" x2="57" y2="31" stroke="#00d4e8" stroke-width="1.5" opacity="0.7"/>
  <line x1="41" y1="38.5" x2="59" y2="38.5" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="43" y1="46" x2="57" y2="46" stroke="#00d4e8" stroke-width="1.5" opacity="0.7"/>
  <line x1="41" y1="53.5" x2="59" y2="53.5" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="43" y1="61" x2="57" y2="61" stroke="#00d4e8" stroke-width="1.5" opacity="0.7"/>
  <line x1="41" y1="68.5" x2="59" y2="68.5" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="43" y1="76" x2="57" y2="76" stroke="#00d4e8" stroke-width="1.5" opacity="0.7"/>

  <!-- Base glow at bottom -->
  <ellipse cx="50" cy="95" rx="18" ry="4" fill="url(#flame)" opacity="0.3"/>
</svg>
